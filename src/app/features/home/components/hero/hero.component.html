<section class="hero" #heroSection>
  <div class="hero-bg-orb orb-1"></div>
  <div class="hero-bg-orb orb-2"></div>

  <div class="container">
    <div class="hero-wrapper">

      <!-- LEFT -->
      <div class="hero-left" data-aos="fade-right" data-aos-duration="800">
        <span class="badge-custom">
          🚀 Next Generation Ecommerce
        </span>
        <h1>
          Shop Smarter,<br>
          <span class="gradient-text">Live Better.</span>
        </h1>
        <p>
          Discover premium products with lightning-fast delivery
          and a secure shopping experience you can trust.
        </p>
        <div class="hero-buttons">
          <button class="btn-primary-custom">
            Explore Products
            <span class="btn-arrow">→</span>
          </button>
          <button class="btn-outline-custom">Learn More</button>
        </div>
        <div class="hero-stats">
          <div class="stat-item" *ngFor="let stat of stats">
            <span class="stat-number">{{ stat.number }}</span>
            <span class="stat-label">{{ stat.label }}</span>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="hero-right" data-aos="fade-left" data-aos-duration="800" data-aos-delay="200">

        <div class="floating-card card-1" data-aos="zoom-in" data-aos-delay="600">
          ⭐ 4.9 Rating
        </div>
        <div class="floating-card card-2" data-aos="zoom-in" data-aos-delay="800">
          🚚 Fast Delivery
        </div>
        <div class="floating-card card-3" data-aos="zoom-in" data-aos-delay="1000">
          🔒 Secure Pay
        </div>

        <!-- SLIDER -->
        <div class="slider-container">
          <button class="slider-btn prev" (click)="prevSlide()">‹</button>

          <div class="product-showcase">
            <div
              class="slide"
              *ngFor="let slide of slides; let i = index"
              [class.active]="i === currentSlide"
              [class.prev-slide]="i === prevSlideIndex">
              <img [src]="slide.image" [alt]="slide.label" />
              <span class="slide-label-tag">{{ slide.label }}</span>
            </div>
          </div>

          <button class="slider-btn next" (click)="nextSlide()">›</button>

          <div class="slider-dots">
            <span
              class="dot"
              *ngFor="let slide of slides; let i = index"
              [class.active]="i === currentSlide"
              (click)="goToSlide(i)">
            </span>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
