<section class="sec">
  <div class="sec-head">
    <h2>Shop by Category</h2>
    <p>Explore top deals across all categories</p>
  </div>
  <div class="grid">
    <div class="card" *ngFor="let cat of categories" (click)="onCategoryClick(cat)">
      <span class="badge" *ngIf="cat.badge" [ngClass]="cat.badgeClass">{{ cat.badge }}</span>
      <div class="icon-wrap" [style.background]="cat.iconBg">
        <i [class]="'bi ' + cat.icon" [style.color]="cat.iconColor"></i>
      </div>
      <div>
        <div class="card-label">{{ cat.name }}</div>
        <div class="card-sub">{{ cat.count }}</div>
      </div>
    </div>
  </div>
</section>
