<section class="newsletter">

  <div class="container">

    <h2>
      Stay Updated
    </h2>

    <p>
      Subscribe to get latest offers.
    </p>

    <div class="newsletter-form">

      <input
        type="email"
        placeholder="Enter Email"
        [(ngModel)]="email">

      <button
        (click)="subscribe()">

        Subscribe

      </button>

    </div>

  </div>

</section>
